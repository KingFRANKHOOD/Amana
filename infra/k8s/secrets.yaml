apiVersion: v1
kind: Secret
metadata:
  name: amana-secrets
  namespace: amana
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "secure-database-password-placeholder"
  REDIS_PASSWORD: "secure-redis-password-placeholder"
  JWT_SECRET: "secure-jwt-secret-at-least-32-chars-long"
  PINATA_API_KEY: "pinata-api-key-placeholder"
  PINATA_SECRET: "pinata-secret-placeholder"
  PINATA_JWT: "pinata-jwt-placeholder"
  IPFS_URL_SIGNING_SECRET: "ipfs-signing-secret-placeholder"

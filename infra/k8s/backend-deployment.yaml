apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: kingfrankhood/amana-backend:latest
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: amana-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: amana-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: amana-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/amana"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: amana-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: amana-secrets
                  key: JWT_SECRET
            - name: PINATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: amana-secrets
                  key: PINATA_API_KEY
            - name: PINATA_SECRET
              valueFrom:
                secretKeyRef:
                  name: amana-secrets
                  key: PINATA_SECRET
            - name: PINATA_JWT
              valueFrom:
                secretKeyRef:
                  name: amana-secrets
                  key: PINATA_JWT
            - name: IPFS_URL_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: amana-secrets
                  key: IPFS_URL_SIGNING_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
